<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocational Hub Management • QualiLearn Admin</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #4f46e5;
            --sidebar-width: 280px;
            --bg-light: #f1f5f9;
            --card-shadow: 0 10px 30px -5px rgba(0,0,0,0.04), 0 4px 10px -2px rgba(0,0,0,0.02);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); color: var(--primary); }
        h1, h2, h3, h4, .outfit { font-family: 'Outfit', sans-serif; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #0f172a;
            color: white;
            z-index: 1000;
        }

        .sidebar-header { padding: 2.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .nav-link {
            padding: 0.85rem 1.75rem;
            margin: 0.2rem 1rem;
            color: #94a3b8;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s ease;
            border-radius: 12px;
        }

        .nav-link.active {
            color: white;
            background: var(--accent);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 3rem;
        }

        /* Vocational Track Cards */
        .voc-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(226, 232, 240, 0.6);
            box-shadow: var(--card-shadow);
            height: 100%;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .voc-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .category-badge {
            background: rgba(79, 70, 229, 0.1);
            color: var(--accent);
            padding: 0.4rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-accent { background: var(--accent); color: white; border-radius: 50px; font-weight: 600; padding: 0.75rem 1.5rem; border: none; }
        .modal-content { border: none; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .form-control, .form-select { border-radius: 12px; padding: 0.75rem 1rem; border-color: #e2e8f0; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" href="admin.html">
                <img src="image/mylogo.png" alt="Logo" style="height: 35px;" class="me-3">
                <span class="outfit fs-4">QualiLearn</span>
            </a>
        </div>
        <nav class="mt-4">
            <a href="admin.html" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard Overview</a>
            <a href="admin-curriculum.html" class="nav-link"><i class="bi bi-journal-bookmark-fill"></i> Curriculum Hub</a>
            <a href="admin-content.html" class="nav-link"><i class="bi bi-play-circle-fill"></i> Content Library</a>
            <a href="admin-assessments.html" class="nav-link"><i class="bi bi-patch-question-fill"></i> Assessments</a>
            <a href="admin-vocational.html" class="nav-link active"><i class="bi bi-hammer"></i> Vocational Skills</a>
            <a href="admin-users.html" class="nav-link"><i class="bi bi-people-fill"></i> User Management</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="fw-bold outfit mb-1 display-6">Vocational Hub</h1>
                <p class="text-muted mb-0 fw-medium">Empowering professional skill development.</p>
            </div>
            <button class="btn btn-accent shadow-sm" data-bs-toggle="modal" data-bs-target="#addVocationalModal">
                <i class="bi bi-plus-lg me-2"></i> Register New Skill Track
            </button>
        </header>

        <div id="voc-container" class="row g-4">
            <!-- Dynamic content -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-accent"></div>
                <p class="mt-2 text-muted fw-bold">Connecting to Skill Hub...</p>
            </div>
        </div>
    </main>

    <!-- Modals -->
    <div class="modal fade" id="addVocationalModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="modal-title fw-bold outfit">New Vocational Track</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addVocForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Skill Designation</label>
                            <input type="text" class="form-control" name="title" required placeholder="e.g. Advanced Carpentry Techniques">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Professional Category</label>
                            <select class="form-select" name="category" required>
                                <option value="Creative">Creative Arts</option>
                                <option value="Technology">Technology</option>
                                <option value="Business">Business & Finance</option>
                                <option value="Trade">Trade & Crafts</option>
                                <option value="Agriculture">Agriculture</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Objective Summary</label>
                            <textarea class="form-control" name="description" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Language Support</label>
                            <select class="form-select" name="language">
                                <option value="en">English</option>
                                <option value="ha">Hausa</option>
                                <option value="yo">Yoruba</option>
                                <option value="ig">Igbo</option>
                                <option value="pi">Pidgin</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Upload Training Guide (Optional)</label>
                            <input type="file" class="form-control" name="file_upload" id="voc-file-upload">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">Primary Resource Link (Fallback)</label>
                            <input type="url" class="form-control" name="resource_url" placeholder="https://youtube.com/...">
                        </div>
                        <button type="submit" class="btn btn-accent w-100 py-3 shadow">Finalize Track Registration</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadVocational);

        async function loadVocational() {
            const container = document.getElementById('voc-container');
            try {
                const res = await apiGetVocational();
                if (res.success) {
                    renderVocational(res.data);
                }
            } catch (err) { container.innerHTML = `<div class="alert alert-danger rounded-4">${err.message}</div>`; }
        }

        function renderVocational(data) {
            const container = document.getElementById('voc-container');
            if (data.length === 0) {
                container.innerHTML = '<div class="col-12 text-center py-5"><p class="text-muted fw-bold">No vocational tracks registered. Initialize the hub above.</p></div>';
                return;
            }

            container.innerHTML = data.map(v => `
                <div class="col-md-6 col-lg-4">
                    <div class="voc-card h-100 p-4">
                        <div class="d-flex justify-content-between align-items-start mb-4">
                            <span class="category-badge shadow-sm border border-accent border-opacity-10">${v.category}</span>
                            <div class="dropdown">
                                <button class="btn btn-link text-muted p-0 border-0" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical fs-5"></i></button>
                                <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg rounded-4">
                                    <li><a class="dropdown-item py-2 fw-bold small" href="#"><i class="bi bi-pencil-fill me-2 text-accent"></i> Modify</a></li>
                                    <li><a class="dropdown-item py-2 fw-bold small text-danger" href="javascript:void(0)" onclick="deleteVoc(${v.id})"><i class="bi bi-trash-fill me-2"></i> Terminate</a></li>
                                </ul>
                            </div>
                        </div>
                        <h5 class="fw-bold outfit mb-2 text-primary" style="font-size: 1.1rem;">${v.title}</h5>
                        <p class="small text-muted mb-4 fw-medium" style="line-height: 1.6;">${v.description.substring(0, 100)}...</p>
                        <div class="d-flex justify-content-between align-items-center mt-auto pt-3 border-top border-light">
                            <span class="badge bg-light text-muted rounded-pill px-3 py-2 fw-bold" style="font-size: 0.65rem; text-transform: uppercase;">Language: ${v.language}</span>
                            <a href="${v.resource_url}" target="_blank" class="btn btn-sm btn-white shadow-sm rounded-pill px-3 fw-bold text-accent">Inspect Asset</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('addVocForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Uploading Assets...';

            const fileInput = document.getElementById('voc-file-upload');
            let resourceUrl = e.target.resource_url.value;

            try {
                if (fileInput.files.length > 0) {
                    const uploadRes = await apiUploadFile(fileInput.files[0]);
                    if (uploadRes.success) {
                        resourceUrl = uploadRes.url;
                    } else {
                        throw new Error(uploadRes.message);
                    }
                }

                const data = {
                    title: e.target.title.value,
                    category: e.target.category.value,
                    description: e.target.description.value,
                    language: e.target.language.value,
                    resource_url: resourceUrl
                };

                const res = await apiAdminCreateVocational(data);
                if (res.success) {
                    bootstrap.Modal.getInstance(document.getElementById('addVocationalModal')).hide();
                    loadVocational();
                    e.target.reset();
                }
            } catch (err) { alert(err.message); }
            finally { btn.disabled = false; btn.textContent = originalText; }
        });

        async function deleteVoc(id) {
            if (!confirm("Confirm termination of vocational track index?")) return;
            try {
                const res = await apiAdminDeleteVocational(id);
                if (res.success) loadVocational();
            } catch (err) { alert(err.message); }
        }
    </script>
</body>
</html>
