<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Management • QualiLearn Admin</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #4f46e5;
            --sidebar-width: 280px;
            --bg-light: #f1f5f9;
            --card-shadow: 0 10px 30px -5px rgba(0,0,0,0.04), 0 4px 10px -2px rgba(0,0,0,0.02);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); color: var(--primary); }
        h1, h2, h3, h4, .outfit { font-family: 'Outfit', sans-serif; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #0f172a;
            color: white;
            z-index: 1000;
        }

        .sidebar-header { padding: 2.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .nav-link {
            padding: 0.85rem 1.75rem;
            margin: 0.2rem 1rem;
            color: #94a3b8;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s ease;
            border-radius: 12px;
        }

        .nav-link.active {
            color: white;
            background: var(--accent);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 3rem;
        }

        /* Question Cards */
        .question-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(226, 232, 240, 0.6);
            box-shadow: var(--card-shadow);
            margin-bottom: 1.5rem;
            transition: all 0.2s ease;
        }
        .question-card:hover { transform: translateY(-3px); border-color: var(--accent); }

        .option-pill {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .option-pill.correct { background: rgba(16, 185, 129, 0.1); border-color: #10b981; color: #059669; font-weight: 700; }

        .btn-accent { background: var(--accent); color: white; border-radius: 50px; font-weight: 600; padding: 0.75rem 1.5rem; border: none; }
        .modal-content { border: none; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .form-control, .form-select { border-radius: 12px; padding: 0.75rem 1rem; border-color: #e2e8f0; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" href="admin.html">
                <img src="image/mylogo.png" alt="Logo" style="height: 35px;" class="me-3">
                <span class="outfit fs-4">QualiLearn</span>
            </a>
        </div>
        <nav class="mt-4">
            <a href="admin.html" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard Overview</a>
            <a href="admin-curriculum.html" class="nav-link"><i class="bi bi-journal-bookmark-fill"></i> Curriculum Hub</a>
            <a href="admin-content.html" class="nav-link"><i class="bi bi-play-circle-fill"></i> Content Library</a>
            <a href="admin-assessments.html" class="nav-link active"><i class="bi bi-patch-question-fill"></i> Assessments</a>
            <a href="admin-vocational.html" class="nav-link"><i class="bi bi-hammer"></i> Vocational Skills</a>
            <a href="admin-users.html" class="nav-link"><i class="bi bi-people-fill"></i> User Management</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="fw-bold outfit mb-1 display-6">Assessment Lab</h1>
                <p class="text-muted mb-0 fw-medium">Managing high-stakes evaluation data.</p>
            </div>
            <button class="btn btn-accent shadow-sm" data-bs-toggle="modal" data-bs-target="#addQuestionModal">
                <i class="bi bi-plus-lg me-2"></i> New Question
            </button>
        </header>

        <div id="questions-container">
            <!-- Questions will be rendered here -->
            <div class="text-center py-5">
                <div class="spinner-border text-accent" role="status"></div>
                <p class="mt-2 text-muted fw-bold">Compiling question bank...</p>
            </div>
        </div>
    </main>

    <!-- Modals -->
    <div class="modal fade" id="addQuestionModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="modal-title fw-bold outfit">Create Examination Object</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addQuestionForm">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-muted">Subject Binding</label>
                                <select class="form-select" name="subject" required>
                                    <option value="Mathematics">Mathematics</option>
                                    <option value="English">English</option>
                                    <option value="Science">Science Hub</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-muted">Difficulty Level</label>
                                <select class="form-select" name="difficulty">
                                    <option value="Easy">Easy</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Hard">Hard</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Question Text</label>
                            <textarea class="form-control" name="question_text" rows="3" required placeholder="e.g. Solve for x in the equation..."></textarea>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-muted">Option A</label>
                                <input type="text" class="form-control" name="option_a" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-muted">Option B</label>
                                <input type="text" class="form-control" name="option_b" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-muted">Option C</label>
                                <input type="text" class="form-control" name="option_c" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-muted">Option D</label>
                                <input type="text" class="form-control" name="option_d" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">Correct Answer Designation</label>
                            <select class="form-select" name="correct_answer" required>
                                <option value="A">Option A</option>
                                <option value="B">Option B</option>
                                <option value="C">Option C</option>
                                <option value="D">Option D</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-accent w-100 py-3 shadow">Publish to Examination Bank</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadQuestions);

        async function loadQuestions() {
            const container = document.getElementById('questions-container');
            try {
                const res = await apiGetPastQuestions();
                if (res.success) {
                    renderQuestions(res.data);
                }
            } catch (err) {
                container.innerHTML = `<div class="alert alert-danger rounded-4">Transmission Error: ${err.message}</div>`;
            }
        }

        function renderQuestions(data) {
            const container = document.getElementById('questions-container');
            if (data.length === 0) {
                container.innerHTML = '<div class="text-center py-5 text-muted fw-bold">Database empty. Populate the bank using the action button above.</div>';
                return;
            }

            container.innerHTML = data.map(q => `
                <div class="question-card">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <div>
                            <span class="badge bg-accent bg-opacity-10 text-accent rounded-pill px-3 py-2 mb-2 fw-bold" style="font-size: 0.7rem; letter-spacing: 0.05em;">${q.subject.toUpperCase()} • ${q.difficulty.toUpperCase()}</span>
                            <h5 class="fw-bold outfit mb-0 mt-2">${q.question_text}</h5>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-white border-0 shadow-sm rounded-circle p-2" onclick="deleteQuestion(${q.id})"><i class="bi bi-trash-fill text-danger"></i></button>
                        </div>
                    </div>
                    <div class="row g-2">
                        <div class="col-md-6"><div class="option-pill ${q.correct_answer === 'A' ? 'correct' : ''}"><span class="fw-bold opacity-50">A.</span> ${q.option_a}</div></div>
                        <div class="col-md-6"><div class="option-pill ${q.correct_answer === 'B' ? 'correct' : ''}"><span class="fw-bold opacity-50">B.</span> ${q.option_b}</div></div>
                        <div class="col-md-6"><div class="option-pill ${q.correct_answer === 'C' ? 'correct' : ''}"><span class="fw-bold opacity-50">C.</span> ${q.option_c}</div></div>
                        <div class="col-md-6"><div class="option-pill ${q.correct_answer === 'D' ? 'correct' : ''}"><span class="fw-bold opacity-50">D.</span> ${q.option_d}</div></div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('addQuestionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const res = await apiAdminCreateQuestion(data);
                if (res.success) {
                    bootstrap.Modal.getInstance(document.getElementById('addQuestionModal')).hide();
                    e.target.reset();
                    loadQuestions();
                }
            } catch (err) { alert(err.message); }
        });

        async function deleteQuestion(id) {
            if (!confirm("Permanent deletion from examination bank. Proceed?")) return;
            try {
                const res = await apiAdminDeleteQuestion(id);
                if (res.success) loadQuestions();
            } catch (err) { alert(err.message); }
        }
    </script>
</body>
</html>
