<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Videos • QualiLearn</title>
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --secondary: #10b981; --dark: #0f172a; --light-bg: #f8fafc; --sidebar-width: 300px; }
        body { font-family: 'Inter', sans-serif; background-color: var(--light-bg); color: var(--dark); }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: white; border-right: 1px solid #e2e8f0; z-index: 1000; }
        .nav-link { padding: 0.8rem 1.5rem; margin: 0.2rem 1rem; border-radius: 12px; color: #64748b; display: flex; align-items: center; transition: all 0.2s; }
        .nav-link i { margin-right: 0.75rem; font-size: 1.2rem; }
        .nav-link:hover { background: #f1f5f9; color: var(--primary); }
        .nav-link.active { background: var(--primary); color: white !important; }
        .content-main { margin-left: var(--sidebar-width); padding: 2rem; min-height: 100vh; }
        
        /* Modern Video Cards */
        .video-card { 
            background: white; 
            border-radius: 28px; 
            border: 1px solid #e2e8f0; 
            overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .video-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            border-color: var(--primary);
        }
        
        .thumbnail-container {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            background: #000;
        }
        
        .thumbnail-container img {
            transition: transform 0.6s ease;
        }
        
        .video-card:hover .thumbnail-container img {
            transform: scale(1.05);
            filter: brightness(0.7);
        }
        
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(0px);
            z-index: 2;
        }
        
        .video-card:hover .play-overlay {
            opacity: 1;
            backdrop-filter: blur(2px);
        }
        
        .play-btn-glass {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            transition: all 0.3s ease;
            transform: scale(0.8);
        }
        
        .video-card:hover .play-btn-glass {
            transform: scale(1);
        }
        
        .play-btn-glass:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.1) !important;
        }

        .video-info {
            padding: 1.75rem;
            background: linear-gradient(to bottom, transparent, white 20%);
        }

        .btn-finish {
            background: #f1f5f9;
            color: #475569;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-finish:hover {
            background: #dcfce7;
            color: #166534;
        }
        .btn-finish.completed {
            background: #dcfce7;
            color: #166534;
        }

        .topic-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            background: var(--primary);
            color: white;
            border-radius: 50px;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .search-container {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .profile-bubble {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .profile-bubble:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3); }
        
        /* Entrance Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }
        @media (max-width: 991px) { .sidebar { transform: translateX(-100%); } .content-main { margin-left: 0; } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="p-4 border-bottom">
            <a class="navbar-brand fw-bold d-flex align-items-center text-primary" href="index.html">
                <img src="image/mylogo.png" alt="QualiLearn Logo" style="height: 28px; width: auto;" class="me-2">
                <span style="font-family: 'Outfit';">QualiLearn</span>
            </a>
        </div>
        <nav class="mt-4">
            <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
            <a href="learning.html" class="nav-link active"><i class="bi bi-book-half"></i> Subjects</a>
            <a href="assessment.html" class="nav-link"><i class="bi bi-question-octagon"></i> Questions</a>
            <a href="chat.html" class="nav-link"><i class="bi bi-robot"></i> AI Study</a>
        </nav>
    </aside>

    <main class="content-main">
        <header class="d-flex justify-content-between align-items-center mb-5 animate__animated animate__fadeIn">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="learning.html" class="text-decoration-none" data-i18n="nav_subjects">Subjects</a></li>
                        <li class="breadcrumb-item active" id="breadcrumb-subject">Subject</li>
                    </ol>
                </nav>
                <h1 class="fw-bold mb-1 outfit display-5" id="subject-title" data-i18n="loading_subject">Loading Subject...</h1>
                <p class="text-muted" data-i18n="hero_subtitle">Explore all video lessons for this subject.</p>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="dropdown">
                    <button class="btn btn-white border shadow-sm rounded-pill px-3" data-bs-toggle="dropdown">
                        <i class="bi bi-translate text-primary me-2"></i> EN
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('en'); location.reload();">English</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('ha'); location.reload();">Hausa</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('yo'); location.reload();">Yoruba</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('ig'); location.reload();">Igbo</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('pi'); location.reload();">Pidgin</a></li>
                    </ul>
                </div>

                <div class="dropdown">
                    <div class="profile-bubble shadow-sm" data-bs-toggle="dropdown" id="user-initial">U</div>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">
                        <li><a class="dropdown-item py-2" href="profile.html"><i class="bi bi-person me-2"></i> Profile</a></li>
                        <li><a class="dropdown-item py-2" href="settings.html"><i class="bi bi-sliders me-2"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2 text-danger" href="javascript:void(0)" onclick="apiLogout()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                    </ul>
                </div>
                <button class="btn btn-light d-lg-none rounded-circle" onclick="document.querySelector('.sidebar').style.transform = 'translateX(0)'">
                    <i class="bi bi-list"></i>
                </button>
            </div>
        </header>

        <!-- Search & Filters -->
        <div class="search-container mb-5 animate__animated animate__fadeIn">
            <div class="row g-3">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 rounded-start-pill ps-4">
                            <i class="bi bi-search text-muted"></i>
                        </span>
                        <input type="text" id="videoSearch" class="form-control border-start-0 rounded-end-pill py-3" placeholder="Search lessons..." data-i18n-placeholder="search_lessons" onkeyup="filterVideos()">
                    </div>
                </div>
                <div class="col-md-4">
                    <select id="topicFilter" class="form-select rounded-pill py-3 px-4" onchange="filterVideos()">
                        <option value="all" data-i18n="all_topics">All Topics</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-5" id="video-grid">
            <!-- Videos will be injected here -->
        </div>
    </main>

    <!-- Video Player Modal -->
    <div class="modal fade" id="videoPlayerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content bg-dark border-0 rounded-4 overflow-hidden shadow-lg">
                <div class="modal-header border-0 p-3 position-absolute top-0 end-0 z-3">
                    <button type="button" class="btn-close btn-close-white bg-dark rounded-circle p-2" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0 bg-black">
                    <div class="ratio ratio-16x9" id="modal-video-container">
                        <!-- Iframe will be injected here -->
                    </div>
                    <div class="p-4 bg-dark text-white d-flex justify-content-between align-items-center">
                        <h4 class="fw-bold mb-0 outfit" id="modal-video-title">Video Title</h4>
                        <button class="btn btn-primary rounded-pill px-5 py-2 fw-bold" id="modal-mark-finished-btn">
                            <i class="bi bi-check-circle me-2"></i> <span data-i18n="mark_finished">Mark Finished</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api-config.js"></script>
    <script src="translations.js"></script>
    <script src="language-selector.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject');
        let allVideos = [];
        let allTopics = [];

        document.addEventListener('DOMContentLoaded', async () => {
            if (!subject) { window.location.href = 'learning.html'; return; }
            
            document.getElementById('subject-title').innerText = subject;
            document.getElementById('subject-title').removeAttribute('data-i18n'); 
            document.getElementById('breadcrumb-subject').innerText = subject;

            const user = JSON.parse(localStorage.getItem('ql_user'));
            if (user) {
                const initialEl = document.getElementById('user-initial');
                if (initialEl) initialEl.textContent = user.first_name.charAt(0).toUpperCase();
            }

            await loadSubjectVideos();
        });

        async function loadSubjectVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>';
            
            try {
                const user = JSON.parse(localStorage.getItem('ql_user'));
                const level = user ? user.education_level : '';
                
                // Fetch topics first for the filter
                const topicsRes = await apiGetTopics();
                if (topicsRes.success) {
                    allTopics = (topicsRes.data[subject] || []).map(t => ({ id: t.id, name: t.name }));
                    const filter = document.getElementById('topicFilter');
                    allTopics.forEach(t => {
                        const opt = document.createElement('option');
                        opt.value = t.id;
                        opt.textContent = t.name;
                        filter.appendChild(opt);
                    });
                }

                const res = await apiGetSubjectVideos(subject, level);
                if (res.success) {
                    allVideos = res.data;
                    renderVideos(allVideos);
                }
            } catch (e) { 
                console.error(e); 
                grid.innerHTML = '<div class="col-12 text-center py-5 text-danger"><h4>Error loading videos. Please try again.</h4></div>';
            }
        }

        function renderVideos(videos) {
            const grid = document.getElementById('video-grid');
            if (videos.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center py-5"><h4>No videos found matching your criteria.</h4></div>';
                return;
            }

            grid.innerHTML = '';
            videos.forEach((v, index) => {
                const videoId = v.video_id;
                const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                const topicName = allTopics.find(t => t.id == v.topic_id)?.name || 'Topic';
                
                const col = document.createElement('div');
                col.className = 'col-md-6 animate-card';
                col.style.animationDelay = `${index * 0.05}s`;
                col.innerHTML = `
                    <div class="video-card h-100 shadow-sm border-0">
                        <div class="ratio ratio-16x9 thumbnail-container" data-bs-toggle="modal" data-bs-target="#videoPlayerModal" onclick="playVideo('${v.id}', '${v.video_url || v.embed_url}', '${v.video_title.replace(/'/g, "\\'")}', '${v.topic_id}')">
                            <img src="${thumbnailUrl}" class="w-100 h-100 object-fit-cover" alt="${v.video_title}" onerror="this.src='https://img.youtube.com/vi/${videoId}/hqdefault.jpg'">
                            <div class="play-overlay">
                                <div class="play-btn-glass">
                                    <i class="bi bi-play-fill"></i>
                                </div>
                            </div>
                        </div>
                        <div class="video-info">
                            <span class="topic-tag">${topicName}</span>
                            <h5 class="fw-bold mb-3 outfit">${v.video_title}</h5>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <button class="btn btn-finish rounded-pill px-4 py-2 fw-bold small d-flex align-items-center gap-2" onclick="markCompleted('${v.id}', '${v.topic_id}')" id="btn-finish-${v.id}">
                                    <i class="bi bi-check-circle"></i> <span data-i18n="mark_finished">Mark Finished</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        function filterVideos() {
            const query = document.getElementById('videoSearch').value.toLowerCase();
            const topicId = document.getElementById('topicFilter').value;

            const filtered = allVideos.filter(v => {
                const matchQuery = v.video_title.toLowerCase().includes(query);
                const matchTopic = (topicId === 'all' || v.topic_id == topicId);
                return matchQuery && matchTopic;
            });

            renderVideos(filtered);
        }

        function playVideo(id, url, title, topicId) {
            const container = document.getElementById('modal-video-container');
            const titleEl = document.getElementById('modal-video-title');
            const markBtn = document.getElementById('modal-mark-finished-btn');
            
            const embedUrl = getEmbedUrl(url);
            container.innerHTML = `<iframe src="${embedUrl}&autoplay=1" allow="autoplay" allowfullscreen></iframe>`;
            titleEl.innerText = title;
            
            // Reset modal button
            markBtn.onclick = () => markCompleted(id, topicId);
            markBtn.className = 'btn btn-primary rounded-pill px-5 py-2 fw-bold';
            markBtn.innerHTML = `<i class="bi bi-check-circle me-2"></i> <span>${translations[getCurrentLang()]['mark_finished']}</span>`;
        }

        // Clean up modal video when closed
        document.getElementById('videoPlayerModal').addEventListener('hidden.bs.modal', () => {
            document.getElementById('modal-video-container').innerHTML = '';
        });

        async function markCompleted(videoId, topicId) {
            const btn = document.getElementById(`btn-finish-${videoId}`);
            const modalBtn = document.getElementById('modal-mark-finished-btn');
            
            if (btn) {
                btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Completed';
                btn.classList.add('completed');
            }
            if (modalBtn) {
                modalBtn.classList.replace('btn-primary', 'btn-success');
                modalBtn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i> Completed';
            }

            const res = await apiTrackActivity({
                activity_type: 'topic_completion',
                module: 'subject',
                topic_id: parseInt(topicId),
                video_id: parseInt(videoId),
                completed: true
            });
        }

        // Start general study timer
        window.addEventListener('load', () => {
             startStudyTimer();
        });
    </script>
</body>
</html>
