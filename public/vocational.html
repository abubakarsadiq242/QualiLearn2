<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vocational Skill Hub - QualiLearn. Learn professional trades in your language.">
    
    <title>Skill Hub • QualiLearn</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="pwa-handler.js" defer></script>
    
    <script>
        if (!localStorage.getItem('ql_token')) {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        :root {
            --primary: #d97706;
            --primary-dark: #b45309;
            --secondary: #0891b2;
            --dark: #1e293b;
            --light-bg: #fffbf5;
            --border: #fde68a;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
            color: var(--dark);
        }

        h1, h2, h3, h4, .outfit { font-family: 'Outfit', sans-serif; }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            background: white;
            border-right: 1px solid #e2e8f0;
            z-index: 1000;
        }

        .nav-link {
            padding: 0.85rem 1.5rem;
            margin: 0.25rem 1rem;
            border-radius: 12px;
            color: #64748b;
            font-weight: 500;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }
        .nav-link i { margin-right: 0.75rem; font-size: 1.25rem; }
        .nav-link.active { background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%); color: white !important; box-shadow: 0 4px 15px rgba(217, 119, 6, 0.2); }

        .content-wrap {
            margin-left: var(--sidebar-width);
            padding: 2.5rem;
            min-height: 100vh;
        }

        /* Skill Cards */
        .skill-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #fef3c7;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
        }
        .skill-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(217, 119, 6, 0.08);
            border-color: var(--primary);
        }

        .skill-image {
            height: 200px;
            width: 100%;
            object-fit: cover;
            position: relative;
        }
        
        .skill-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-workshop {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 14px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s ease;
        }
        .btn-workshop:hover {
            background: var(--primary-dark);
            box-shadow: 0 8px 15px rgba(217, 119, 6, 0.3);
        }

        @media (max-width: 991px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            .sidebar.active { transform: translateX(0); }
            .content-wrap { margin-left: 0; padding: 1rem; }
        }

        .profile-bubble {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .profile-bubble:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(217, 119, 6, 0.3); }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="mainSidebar">
        <div class="p-4 border-bottom">
            <a class="navbar-brand fw-bold d-flex align-items-center text-primary" href="index.html">
                <img src="image/mylogo.png" alt="QualiLearn Logo" style="height: 28px; width: auto;" class="me-2">
                <span class="outfit">VocationalPro</span>
            </a>
        </div>
        
        <nav class="mt-4">
            <a href="vocational-dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> <span data-i18n="workshop_dashboard">Workshop Dashboard</span></a>
            <a href="vocational.html" class="nav-link active"><i class="bi bi-hammer"></i> <span data-i18n="skill_training">Skill Training</span></a>
            <a href="vocational-chat.html" class="nav-link"><i class="bi bi-robot"></i> <span data-i18n="expert_support">Expert Support</span></a>
            
            <div class="mt-5 border-top pt-4">
                <a href="vocational-profile.html" class="nav-link"><i class="bi bi-person-circle"></i> <span data-i18n="nav_profile">Profile</span></a>
                <a href="javascript:void(0)" onclick="apiLogout()" class="nav-link text-danger"><i class="bi bi-box-arrow-right"></i> <span data-i18n="nav_logout">Logout</span></a>
            </div>
        </nav>
    </aside>

    <main class="content-wrap">
        <header class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="fw-bold mb-1 outfit display-5" data-i18n="nav_vocational">Skill Hub</h1>
                <p class="text-muted" data-i18n="feature_vocational_desc">Professional hands-on training for the next generation.</p>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="dropdown">
                    <button class="btn btn-white border shadow-sm rounded-pill px-3" data-bs-toggle="dropdown">
                        <i class="bi bi-translate text-primary me-2"></i> EN
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('en')">English</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('ha')">Hausa</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('yo')">Yoruba</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('ig')">Igbo</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('pi')">Pidgin</a></li>
                    </ul>
                </div>

                <div class="dropdown">
                    <div class="profile-bubble shadow-sm" data-bs-toggle="dropdown" id="user-initial">U</div>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">
                        <li><a class="dropdown-item py-2" href="profile.html"><i class="bi bi-person me-2"></i> Profile</a></li>
                        <li><a class="dropdown-item py-2" href="settings.html"><i class="bi bi-sliders me-2"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2 text-danger" href="javascript:void(0)" onclick="apiLogout()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                    </ul>
                </div>

                <button class="btn btn-white border shadow-sm rounded-circle p-2 d-lg-none" onclick="document.getElementById('mainSidebar').classList.toggle('active')">
                    <i class="bi bi-list"></i>
                </button>
            </div>
        </header>

        <section id="categories" class="d-flex gap-2 mb-5 overflow-auto pb-2">
            <button class="btn btn-primary rounded-pill px-4 active" onclick="filterVocational(this, '')" data-i18n="view_all">All Skills</button>
            <button class="btn btn-white border rounded-pill px-4" onclick="filterVocational(this, 'Technology')" data-i18n="cat_technology">Technology</button>
            <button class="btn btn-white border rounded-pill px-4" onclick="filterVocational(this, 'Fashion')" data-i18n="cat_fashion">Fashion</button>
            <button class="btn btn-white border rounded-pill px-4" onclick="filterVocational(this, 'Culinary')" data-i18n="cat_culinary">Culinary</button>
            <button class="btn btn-white border rounded-pill px-4" onclick="filterVocational(this, 'Construction')" data-i18n="cat_construction">Construction</button>
        </section>

        <div class="row g-4" id="skills-grid">
            <!-- Skills load here -->
        </div>
    </main>

    <!-- Video Player Modal -->
    <div class="modal fade" id="videoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg overflow-hidden">
                <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h5 class="modal-title fw-bold outfit" id="modalTitle">Skill Training</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" onclick="stopVideo()"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="ratio ratio-16x9 rounded-4 overflow-hidden mb-3 shadow-sm bg-dark">
                        <iframe id="videoFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    </div>
                    <div class="d-flex justify-content-between align-items-center bg-light p-3 rounded-4 mt-3">
                        <div class="d-flex align-items-center gap-2">
                             <i class="bi bi-clock-history text-primary"></i>
                             <span class="small fw-bold">Study Time: <span id="studyTimerDisplay">00:00</span></span>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                             <i class="bi bi-shield-check text-success"></i>
                             <span class="small fw-bold text-success" data-i18n="active_progress">Progress Tracked</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api-config.js"></script>
    <script src="translations.js"></script>
    <script src="language-selector.js"></script>
    
    <script>
        let videoModal;
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('ql_user'));
            if (user) {
                const initialEl = document.getElementById('user-initial');
                if (initialEl) initialEl.textContent = user.first_name.charAt(0).toUpperCase();
            }

            videoModal = new bootstrap.Modal(document.getElementById('videoModal'));
            const lang = localStorage.getItem('ql_lang') || 'en';
            if (typeof applyLanguage === 'function') applyLanguage(lang);
            
            const params = new URLSearchParams(window.location.search);
            const resumeId = params.get('id');
            
            loadVocational().then(() => {
                if (resumeId) {
                    // Find the skill in the grid and open it
                    const skillElement = document.querySelector(`article[onclick*="'${resumeId}'"]`);
                    if (skillElement) skillElement.click();
                }
            });
        });

        async function openVideo(url, title, skillId) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('videoFrame').src = getEmbedUrl(url);
            videoModal.show();
            
            // Start real-time tracking for vocational activity
            localStorage.setItem('ql_study_topic', skillId);
            localStorage.setItem('ql_study_topic_name', title);
            
            if (typeof startStudyTimer === 'function') startStudyTimer(skillId); 
            
            await apiTrackActivity({
                activity_type: 'skill_learning',
                module: 'vocational',
                id: parseInt(skillId),
                duration: 30
            });
        }

        function stopVideo() {
            document.getElementById('videoFrame').src = '';
            if (typeof stopStudyTimer === 'function') stopStudyTimer();
        }

        function filterVocational(btn, category) {
            document.querySelectorAll('#categories .btn').forEach(b => {
                b.classList.remove('btn-primary', 'active');
                b.classList.add('btn-white', 'border');
            });
            btn.classList.add('btn-primary', 'active');
            btn.classList.remove('btn-white', 'border');
            loadVocational(category);
        }

        async function loadVocational(category = '') {
            const grid = document.getElementById('skills-grid');
            const lang = localStorage.getItem('ql_lang') || 'en';
            const dict = (typeof translations !== 'undefined') ? (translations[lang] || translations['en']) : {};
            
            try {
                grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>';
                
                const response = await apiGetVocational(category, lang);
                
                if (response.success) {
                    const skills = response.data;
                    grid.innerHTML = '';
                    
                    if (skills.length === 0) {
                         grid.innerHTML = `<div class="col-12 text-center py-5"><h5>No skills found in this language.</h5></div>`;
                         return;
                    }

                    const images = {
                        'Fashion': 'https://images.unsplash.com/photo-1544441893-675973e31985?w=500&auto=format&fit=crop',
                        'Technology': 'https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500&auto=format&fit=crop',
                        'Culinary': 'https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=500&auto=format&fit=crop',
                        'Construction': 'https://images.unsplash.com/photo-1504307651254-35680f3366d4?w=500&auto=format&fit=crop',
                        'Automotive': 'https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=500&auto=format&fit=crop'
                    };

                    skills.forEach(s => {
                        const col = document.createElement('div');
                        col.className = 'col-md-6 col-lg-4 animate__animated animate__fadeIn';
                        col.innerHTML = `
                            <article class="skill-card" onclick="openVideo('${s.resource_url}', '${s.title}', '${s.id}')" style="cursor: pointer;">
                                <div class="position-relative">
                                    <img src="${images[s.category] || 'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=500&auto=format&fit=crop'}" class="skill-image" alt="${s.title}">
                                    <span class="skill-badge text-primary">${s.category}</span>
                                </div>
                                <div class="p-4">
                                    <h4 class="fw-bold mb-2">${s.title}</h4>
                                    <p class="text-muted small mb-4">${s.description}</p>
                                    <div class="d-flex justify-content-between align-items-center mt-auto">
                                        <div class="d-flex align-items-center text-primary small fw-bold" onclick="openVideo('${s.resource_url}', '${s.title}', '${s.id}')">
                                            <span>Watch Workshop</span>
                                            <i class="bi bi-arrow-right ms-2"></i>
                                        </div>
                                        ${s.resource_url && s.resource_url.includes('/uploads/') ? `
                                            <a href="${s.resource_url}" download class="btn btn-sm btn-outline-secondary rounded-pill px-3 fw-bold">
                                                <i class="bi bi-download me-1"></i> Guide
                                            </a>
                                        ` : ''}
                                    </div>
                                </div>
                            </article>
                        `;
                        grid.appendChild(col);
                    });
                }
            } catch (err) {
                console.error('Failed to load vocational content:', err);
                grid.innerHTML = '<div class="col-12 text-center py-5 text-danger"><h5>Error loading skills. Please try again.</h5></div>';
            }
        }
    </script>
</body>
</html>
