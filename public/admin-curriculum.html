<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Curriculum • QualiLearn Admin</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #4f46e5;
            --sidebar-width: 280px;
            --bg-light: #f1f5f9;
            --card-shadow: 0 10px 30px -5px rgba(0,0,0,0.04), 0 4px 10px -2px rgba(0,0,0,0.02);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); color: var(--primary); }
        h1, h2, h3, h4, .outfit { font-family: 'Outfit', sans-serif; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #0f172a;
            color: white;
            z-index: 1000;
        }

        .sidebar-header { padding: 2.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .nav-link {
            padding: 0.85rem 1.75rem;
            margin: 0.2rem 1rem;
            color: #94a3b8;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s ease;
            border-radius: 12px;
        }

        .nav-link.active {
            color: white;
            background: var(--accent);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 3rem;
        }

        /* Modern Curriculum Cards */
        .subject-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(226, 232, 240, 0.6);
            box-shadow: var(--card-shadow);
            margin-bottom: 2.5rem;
        }

        .topic-pill {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1rem 1.25rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topic-pill:hover {
            border-color: var(--accent);
            background: white;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .subject-badge {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .btn-accent { background: var(--accent); color: white; border-radius: 50px; font-weight: 600; padding: 0.75rem 1.5rem; border: none; }
        .btn-accent:hover { opacity: 0.9; transform: scale(1.02); }

        /* Modal Styling */
        .modal-content { border: none; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .form-control, .form-select { border-radius: 12px; padding: 0.75rem 1rem; border-color: #e2e8f0; }
        .form-control:focus { box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); border-color: var(--accent); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" href="admin.html">
                <img src="image/mylogo.png" alt="Logo" style="height: 35px;" class="me-3">
                <span class="outfit fs-4">QualiLearn</span>
            </a>
        </div>
        <nav class="mt-4">
            <a href="admin.html" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard Overview</a>
            <a href="admin-curriculum.html" class="nav-link active"><i class="bi bi-journal-bookmark-fill"></i> Curriculum Hub</a>
            <a href="admin-content.html" class="nav-link"><i class="bi bi-play-circle-fill"></i> Content Library</a>
            <a href="admin-assessments.html" class="nav-link"><i class="bi bi-patch-question-fill"></i> Assessments</a>
            <a href="admin-vocational.html" class="nav-link"><i class="bi bi-hammer"></i> Vocational Skills</a>
            <a href="admin-users.html" class="nav-link"><i class="bi bi-people-fill"></i> User Management</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="fw-bold outfit mb-1 display-6">Curriculum Hub</h1>
                <p class="text-muted mb-0 fw-medium">Architecture of academic success.</p>
            </div>
            <button class="btn btn-accent shadow-sm" data-bs-toggle="modal" data-bs-target="#addTopicModal">
                <i class="bi bi-plus-lg me-2"></i> Create New Topic
            </button>
        </header>

        <div id="curriculum-container">
            <!-- Subjects and Topics will be rendered here -->
            <div class="text-center py-5">
                <div class="spinner-border text-accent" role="status"></div>
                <p class="mt-2 text-muted fw-bold">Synchronizing repository...</p>
            </div>
        </div>
    </main>

    <!-- Modals -->
    <div class="modal fade" id="addTopicModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="modal-title fw-bold outfit">Create New Topic</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addTopicForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Subject Category</label>
                            <select class="form-select" name="subject" required>
                                <option value="Mathematics">Mathematics</option>
                                <option value="English">English Language</option>
                                <option value="Science">General Science</option>
                                <option value="Physics">Physics</option>
                                <option value="Chemistry">Chemistry</option>
                                <option value="Biology">Biology</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">Topic Designation</label>
                            <input type="text" class="form-control" name="name" required placeholder="e.g. Quantum Mechanics Intro">
                        </div>
                        <button type="submit" class="btn btn-accent w-100 py-3 shadow">Finalize Topic Creation</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Topic Modal -->
    <div class="modal fade" id="editTopicModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="modal-title fw-bold outfit">Modify Topic Metadata</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editTopicForm">
                        <input type="hidden" name="id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Subject Category</label>
                            <select class="form-select" name="subject" required>
                                <option value="Mathematics">Mathematics</option>
                                <option value="English">English Language</option>
                                <option value="Science">General Science</option>
                                <option value="Physics">Physics</option>
                                <option value="Chemistry">Chemistry</option>
                                <option value="Biology">Biology</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">Topic Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <button type="submit" class="btn btn-accent w-100 py-3 shadow">Save Modifications</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api-config.js"></script>
    <script>
        let allTopics = {};

        document.addEventListener('DOMContentLoaded', loadCurriculum);

        async function loadCurriculum() {
            const container = document.getElementById('curriculum-container');
            try {
                const res = await apiGetTopics();
                if (res.success) {
                    allTopics = res.data;
                    renderCurriculum(res.data);
                }
            } catch (err) {
                container.innerHTML = `<div class="alert alert-danger rounded-4">Critical Error: ${err.message}</div>`;
            }
        }

        function renderCurriculum(data) {
            const container = document.getElementById('curriculum-container');
            if (Object.keys(data).length === 0) {
                container.innerHTML = '<div class="text-center py-5"><p class="text-muted">Repository empty. Initialize your first topic above.</p></div>';
                return;
            }

            container.innerHTML = Object.entries(data).map(([subject, topics]) => `
                <div class="subject-card">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="subject-badge shadow-sm"><i class="bi bi-folder2-open"></i></div>
                        <div>
                            <h4 class="fw-bold outfit mb-0 text-primary">${subject}</h4>
                            <p class="small text-muted mb-0">${topics.length} units published</p>
                        </div>
                    </div>
                    <div class="row g-3">
                        ${topics.map(t => `
                            <div class="col-md-6">
                                <div class="topic-pill">
                                    <div>
                                        <h6 class="fw-bold mb-1">${t.name}</h6>
                                        <p class="small text-muted mb-0" style="font-size: 0.7rem; font-weight: 600;">OBJECT ID: ${t.id}</p>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-sm btn-white border-0 shadow-sm rounded-circle p-2" onclick="openEditTopic(${t.id}, '${subject}', '${t.name}')" title="Edit Topic"><i class="bi bi-pencil-fill text-accent"></i></button>
                                        <button class="btn btn-sm btn-white border-0 shadow-sm rounded-circle p-2" onclick="deleteTopic(${t.id})" title="Delete Topic"><i class="bi bi-trash-fill text-danger"></i></button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('addTopicForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Synchronizing...';
            
            const name = e.target.name.value;
            const subject = e.target.subject.value;

            try {
                const res = await apiCreateTopic(name, subject);
                if (res.success) {
                    bootstrap.Modal.getInstance(document.getElementById('addTopicModal')).hide();
                    e.target.reset();
                    loadCurriculum();
                }
            } catch (err) { alert(err.message); }
            finally { btn.disabled = false; btn.textContent = 'Finalize Topic Creation'; }
        });

        function openEditTopic(id, subject, name) {
            const modal = new bootstrap.Modal(document.getElementById('editTopicModal'));
            const form = document.getElementById('editTopicForm');
            form.id.value = id;
            form.subject.value = subject;
            form.name.value = name;
            modal.show();
        }

        document.getElementById('editTopicForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = e.target.id.value;
            const data = {
                name: e.target.name.value,
                subject: e.target.subject.value
            };

            try {
                const res = await apiAdminUpdateTopic(id, data);
                if (res.success) {
                    bootstrap.Modal.getInstance(document.getElementById('editTopicModal')).hide();
                    loadCurriculum();
                }
            } catch (err) { alert(err.message); }
        });

        async function deleteTopic(id) {
            if (!confirm("Permanent action! This will de-index the topic. Proceed?")) return;
            try {
                const res = await apiDeleteTopic(id);
                if (res.success) loadCurriculum();
            } catch (err) { alert(err.message); }
        }
    </script>
</body>
</html>
