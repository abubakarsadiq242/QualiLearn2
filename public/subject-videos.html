<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Videos • QualiLearn</title>
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --secondary: #10b981; --dark: #0f172a; --light-bg: #f8fafc; --sidebar-width: 300px; }
        body { font-family: 'Inter', sans-serif; background-color: var(--light-bg); color: var(--dark); }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: white; border-right: 1px solid #e2e8f0; z-index: 1000; }
        .nav-link { padding: 0.8rem 1.5rem; margin: 0.2rem 1rem; border-radius: 12px; color: #64748b; display: flex; align-items: center; transition: all 0.2s; }
        .nav-link i { margin-right: 0.75rem; font-size: 1.2rem; }
        .nav-link:hover { background: #f1f5f9; color: var(--primary); }
        .nav-link.active { background: var(--primary); color: white !important; }
        .content-main { margin-left: var(--sidebar-width); padding: 2rem; min-height: 100vh; }
        .video-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; overflow: hidden; transition: 0.3s; }
        .video-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.06); }
        .ratio-16x9 { background: #000; }

        .profile-bubble {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .profile-bubble:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3); }
        @media (max-width: 991px) { .sidebar { transform: translateX(-100%); } .content-main { margin-left: 0; } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="p-4 border-bottom">
            <a class="navbar-brand fw-bold d-flex align-items-center text-primary" href="index.html">
                <img src="image/mylogo.png" alt="QualiLearn Logo" style="height: 28px; width: auto;" class="me-2">
                <span style="font-family: 'Outfit';">QualiLearn</span>
            </a>
        </div>
        <nav class="mt-4">
            <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
            <a href="learning.html" class="nav-link active"><i class="bi bi-book-half"></i> Subjects</a>
            <a href="assessment.html" class="nav-link"><i class="bi bi-question-octagon"></i> Questions</a>
            <a href="chat.html" class="nav-link"><i class="bi bi-robot"></i> AI Study</a>
        </nav>
    </aside>

    <main class="content-main">
        <header class="d-flex justify-content-between align-items-center mb-5 animate__animated animate__fadeIn">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="learning.html" class="text-decoration-none">Subjects</a></li>
                        <li class="breadcrumb-item active" id="breadcrumb-subject">Subject</li>
                    </ol>
                </nav>
                <h1 class="fw-bold mb-1 outfit display-5" id="subject-title">Loading Subject...</h1>
                <p class="text-muted">Explore all video lessons for this subject.</p>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="dropdown">
                    <button class="btn btn-white border shadow-sm rounded-pill px-3" data-bs-toggle="dropdown">
                        <i class="bi bi-translate text-primary me-2"></i> EN
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('en'); location.reload();">English</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('ha'); location.reload();">Hausa</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('yo'); location.reload();">Yoruba</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('ig'); location.reload();">Igbo</a></li>
                        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="setLanguage('pi'); location.reload();">Pidgin</a></li>
                    </ul>
                </div>

                <div class="dropdown">
                    <div class="profile-bubble shadow-sm" data-bs-toggle="dropdown" id="user-initial">U</div>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">
                        <li><a class="dropdown-item py-2" href="profile.html"><i class="bi bi-person me-2"></i> Profile</a></li>
                        <li><a class="dropdown-item py-2" href="settings.html"><i class="bi bi-sliders me-2"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2 text-danger" href="javascript:void(0)" onclick="apiLogout()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                    </ul>
                </div>
                <button class="btn btn-light d-lg-none rounded-circle" onclick="document.querySelector('.sidebar').style.transform = 'translateX(0)'">
                    <i class="bi bi-list"></i>
                </button>
            </div>
        </header>

        <div class="row g-4 mb-5" id="video-grid">
            <!-- Videos will be injected here -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api-config.js"></script>
    <script src="translations.js"></script>
    <script src="language-selector.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject');

        document.addEventListener('DOMContentLoaded', () => {
            if (!subject) { window.location.href = 'learning.html'; return; }
            
            document.getElementById('subject-title').innerText = subject;
            document.getElementById('breadcrumb-subject').innerText = subject;

            const user = JSON.parse(localStorage.getItem('ql_user'));
            if (user) {
                const initialEl = document.getElementById('user-initial');
                if (initialEl) initialEl.textContent = user.first_name.charAt(0).toUpperCase();
            }

            loadSubjectVideos();
        });

        async function loadSubjectVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>';
            
            try {
                const user = JSON.parse(localStorage.getItem('ql_user'));
                const level = user ? user.education_level : '';
                const res = await apiGetSubjectVideos(subject, level);
                
                if (res.success) {
                    const videos = res.data;
                    if (videos.length === 0) {
                        grid.innerHTML = '<div class="col-12 text-center py-5"><h4>No videos found for this subject.</h4></div>';
                    } else {
                        grid.innerHTML = '';
                        videos.forEach(v => {
                            const col = document.createElement('div');
                            col.className = 'col-md-6 animate__animated animate__fadeInUp';
                            col.innerHTML = `
                                <div class="video-card h-100 shadow-sm border-0">
                                    <div class="ratio ratio-16x9">
                                        <iframe src="${getEmbedUrl(v.embed_url || v.video_url)}" allowfullscreen></iframe>
                                    </div>
                                    <div class="p-4">
                                        <h5 class="fw-bold mb-3 outfit">${v.video_title}</h5>
                                        <div class="d-flex justify-content-between align-items-center">
                                            <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm" onclick="markCompleted('${v.id}', '${v.topic_id}')">
                                                <i class="bi bi-check-circle me-2"></i> Mark Finished
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `;
                            grid.appendChild(col);
                        });
                    }
                }
            } catch (e) { 
                console.error(e); 
                grid.innerHTML = '<div class="col-12 text-center py-5 text-danger"><h4>Error loading videos. Please try again.</h4></div>';
            }
        }

        async function markCompleted(videoId, topicId) {
            const res = await apiTrackActivity({
                activity_type: 'topic_completion',
                module: 'subject',
                topic_id: parseInt(topicId),
                video_id: parseInt(videoId),
                completed: true
            });
            if (res.success) {
                alert('Lesson marked as completed! Progress updated.');
            }
        }

        // Start general study timer
        window.addEventListener('load', () => {
             startStudyTimer();
        });
    </script>
</body>
</html>
